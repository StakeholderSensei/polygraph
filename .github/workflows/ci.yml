name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Windows is polygraph's validated platform for v0.1.0; the macOS/Linux
    # matrix is on the roadmap (see CHANGELOG unreleased backlog).
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Test suite (node:test, zero dependencies)
        run: node --test tests/*.test.mjs
      - name: Bench scenarios
        run: node bench/run.mjs
